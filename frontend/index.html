<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time-Lock Wallet Demo</title>
    <style>
      :root {
        --bg: radial-gradient(1200px 700px at 10% -10%, #f6efe3 0%, #ece7de 50%, #e4ded4 100%);
        --card: rgba(255, 255, 255, 0.7);
        --text: #1f1a17;
        --muted: #5e5651;
        --accent: #0e8b78;
        --accent-2: #0c6e5f;
        --danger: #9a2f2f;
        --border: rgba(31, 26, 23, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .container {
        width: min(920px, 92vw);
        margin: 36px auto;
      }

      .hero {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        backdrop-filter: blur(6px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        animation: fadeIn 460ms ease;
      }

      .title {
        margin: 0 0 8px;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .field input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        font-size: 0.95rem;
        background: #fff;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        background: #fff;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-danger {
        background: var(--danger);
        color: #fff;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        background: #fff;
      }

      .stat .k {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .stat .v {
        margin-top: 4px;
        font-size: 0.95rem;
        word-break: break-all;
      }

      .log {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        padding: 12px;
        min-height: 46px;
        color: #2f2a26;
      }

      .hint {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 760px) {
        .grid,
        .stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1 class="title">Time-Lock Wallet Demo</h1>
        <p class="subtitle">Connect MetaMask, load your deployed contract, deposit ETH, and withdraw after unlock.</p>

        <div class="grid">
          <div class="field">
            <label for="contractAddress">Contract Address</label>
            <input id="contractAddress" placeholder="0x..." />
          </div>
          <div class="field">
            <label for="depositAmount">Deposit Amount (ETH)</label>
            <input id="depositAmount" placeholder="0.05" value="0.05" />
          </div>
        </div>

        <div class="actions">
          <button id="connectBtn" class="btn-primary">Connect MetaMask</button>
          <button id="switchBtn" class="btn-secondary">Switch to Hardhat 31337</button>
          <button id="loadBtn" class="btn-secondary">Load Contract</button>
          <button id="depositBtn" class="btn-primary" disabled>Deposit</button>
          <button id="withdrawBtn" class="btn-danger" disabled>Withdraw</button>
        </div>

        <div class="stats">
          <div class="stat"><div class="k">Connected Account</div><div class="v" id="account">-</div></div>
          <div class="stat"><div class="k">Owner</div><div class="v" id="owner">-</div></div>
          <div class="stat"><div class="k">Unlock Time</div><div class="v" id="unlock">-</div></div>
          <div class="stat"><div class="k">Countdown</div><div class="v" id="countdown">-</div></div>
          <div class="stat"><div class="k">Contract Balance</div><div class="v" id="balance">-</div></div>
          <div class="stat"><div class="k">Chain ID</div><div class="v" id="chain">-</div></div>
        </div>

        <div class="log" id="log">Ready.</div>
        <p class="hint">Tip: withdraw works only from owner account and only after unlock time.</p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
